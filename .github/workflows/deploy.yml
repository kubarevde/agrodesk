name: Deploy Frontend to Yandex Object Storage

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build
        env:
          VITE_USE_MOCKS: false
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.YC_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.YC_SECRET_ACCESS_KEY }}
          aws-region: ru-central1

      # Статика с долгим кэшем
      - run: |
          aws s3 sync dist/ s3://${{ secrets.YC_BUCKET_NAME }}/ \
            --endpoint-url https://storage.yandexcloud.net \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html" --exclude "sw.js" --exclude "manifest.webmanifest"

      # Без кэша
      - run: |
          for f in index.html sw.js manifest.webmanifest; do
            [ -f "dist/$f" ] && aws s3 cp dist/$f s3://${{ secrets.YC_BUCKET_NAME }}/$f \
              --endpoint-url https://storage.yandexcloud.net \
              --cache-control "no-cache,no-store,must-revalidate"
          done
